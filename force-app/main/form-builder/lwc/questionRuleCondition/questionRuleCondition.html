<template>
  <lightning-layout horizontal-align="spread" vertical-align="center">
    <lightning-layout-item
      padding="around-small"
      size="1"
      class="slds-text-align_center"
    >
      <p>{counter}</p>
    </lightning-layout-item>
    <lightning-layout-item
      padding="around-small"
      size="2"
      class="slds-text-align_center"
    >
      <lightning-radio-group
        data-id="source-type-radio"
        data-field="Source_Type__c"
        label={LABELS.resourceType}
        variant="label-hidden"
        value={condition.Source_Type__c}
        options={sourceTypes}
        onchange={handleChange}
        type="button"
      ></lightning-radio-group>
    </lightning-layout-item>
    <lightning-layout-item
      padding="around-small"
      size="2"
      class="slds-text-align_center"
    >
      <lightning-combobox
        lwc:if={isAnswerType}
        required
        label={LABELS.questionCatalog}
        data-field="Question_Catalog__c"
        variant="label-hidden"
        options={catalog}
        value={condition.Question_Catalog__c}
        onchange={handleChange}
      ></lightning-combobox>
      <lightning-input
        lwc:else
        required
        label={LABELS.contextPath}
        variant="label-hidden"
        data-field="Source_Path__c"
        value={condition.Source_Path__c}
        onchange={handleChange}
      ></lightning-input>
    </lightning-layout-item>
    <lightning-layout-item
      padding="around-small"
      size="2"
      class="slds-text-align_center"
    >
      <lightning-combobox
        label={LABELS.operator}
        required
        options={operators}
        variant="label-hidden"
        data-field="Operator__c"
        value={condition.Operator__c}
        onchange={handleChange}
      ></lightning-combobox>
    </lightning-layout-item>
    <lightning-layout-item
      padding="around-small"
      size="1"
      class="slds-text-align_center"
    >
      <lightning-input
        type="checkbox"
        label={LABELS.not}
        checked={condition.Not__c}
        data-field="Not__c"
        onchange={handleChange}
      ></lightning-input>
    </lightning-layout-item>
    <lightning-layout-item
      padding="around-small"
      size="3"
      class="slds-text-align_center"
    >
      <lightning-input
        label={LABELS.value}
        required
        value={condition.Value__c}
        variant="label-hidden"
        data-field="Value__c"
        onchange={handleChange}
      ></lightning-input>
    </lightning-layout-item>
    <lightning-layout-item
      padding="around-small"
      size="1"
      class="slds-text-align_center"
    >
      <lightning-button-icon
        data-id="delete-condition-btn"
        icon-name="utility:delete"
        onclick={handleDelete}
      ></lightning-button-icon>
    </lightning-layout-item>
  </lightning-layout>
</template>
