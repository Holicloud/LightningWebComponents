<template>
  <div class="container slds-p-around_medium">
    <template lwc:if={file}>
      <div class="slds-media slds-media_center" data-id="file-tile">
        <div class="slds-media__figure">
          <template lwc:if={hidePreview}>
            <lightning-icon
              icon-name={file.iconName}
              size="small"
              data-id="file-icon"
            ></lightning-icon>
          </template>
          <template lwc:else>
            <template lwc:if={file.thumbnailUrl}>
              <template lwc:if={_showIcon}>
                <lightning-icon
                  icon-name={file.iconName}
                  size="small"
                  data-id="file-icon"
                ></lightning-icon>
              </template>
              <template lwc:else>
                <img
                  src={file.thumbnailUrl}
                  alt={file.displayName}
                  class="file-thumbnail"
                  data-id="file-img"
                  onerror={handleImageError}
                />
              </template>
            </template>
            <template lwc:else>
              <lightning-icon
                icon-name={file.iconName}
                size="small"
                data-id="file-icon"
              ></lightning-icon>
            </template>
          </template>
        </div>
        <div class="slds-media__body">
          <h3
            class="slds-text-heading_small slds-truncate"
            title={file.displayName}
          >
            <a href={file.fileUrl} target="_blank" data-id="file-link"
              >{file.displayName}</a
            >
          </h3>
          <p
            class="slds-text-body_small slds-text-color_weak slds-truncate"
            data-id="file-meta"
          >
            {file.formattedMetadata}
          </p>
        </div>
      </div>
    </template>
  </div>
</template>
