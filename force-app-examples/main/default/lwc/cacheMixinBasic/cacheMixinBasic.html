<template>
  <lightning-card
    title="CacheMixin (Session Storage)"
    icon-name="utility:database"
  >
    <div slot="actions">
      <lightning-badge
        label={statusLabel}
        variant={statusVariant}
        class="slds-m-right_small"
      ></lightning-badge>
      <lightning-button
        label="Clear Cache"
        variant="border-filled"
        onclick={handleClearCache}
      ></lightning-button>
    </div>

    <div class="slds-p-around_medium">
      <div class="slds-m-bottom_medium slds-box slds-theme_shade">
        <h3 class="slds-text-heading_small slds-m-bottom_small">
          Configuration
        </h3>
        <lightning-input
          type="toggle"
          label="Persist state on navigation?"
          name="isCacheEnabled"
          checked={isCacheEnabled}
          message-toggle-active="On"
          message-toggle-inactive="Off"
          onchange={handleToggleCache}
        ></lightning-input>
        <p class="slds-text-body_small slds-m-top_small">
          When ON, the inputs below will be saved to <b>sessionStorage</b> when
          you navigate away and restored when you return.
        </p>
      </div>

      <div class="slds-grid slds-gutters slds-wrap">
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
          <lightning-input
            label="Full Name"
            name="inputValue"
            value={inputValue}
            onchange={handleInputChange}
            placeholder="Type something..."
          ></lightning-input>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
          <lightning-input
            type="email"
            label="Email Address"
            name="emailValue"
            value={emailValue}
            onchange={handleInputChange}
            placeholder="example@domain.com"
          ></lightning-input>
        </div>
        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
          <lightning-input
            type="tel"
            label="Phone Number"
            name="phoneValue"
            value={phoneValue}
            onchange={handleInputChange}
            placeholder="555-0123"
          ></lightning-input>
        </div>
      </div>

      <div class="slds-m-top_large">
        <h3 class="slds-text-heading_small slds-m-bottom_small">
          Activity Log
        </h3>
        <div
          class="slds-scrollable_y"
          style="
            height: 100px;
            border: 1px solid #dddbda;
            border-radius: 4px;
            padding: 8px;
          "
        >
          <template for:each={logs} for:item="log">
            <p key={log.id} class="slds-text-body_small">{log.text}</p>
          </template>
        </div>
      </div>
    </div>
  </lightning-card>
</template>
