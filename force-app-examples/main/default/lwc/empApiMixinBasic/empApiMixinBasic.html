<template>
  <lightning-card title="EMP API Mixin Example" icon-name="custom:custom13">
    <div slot="actions">
      <lightning-badge
        label={subscriptionStatus}
        variant={statusVariant}
      ></lightning-badge>
    </div>

    <div class="slds-p-around_medium">
      <div
        class="slds-grid slds-gutters slds-grid_vertical-align-center slds-m-bottom_medium"
      >
        <div class="slds-col slds-size_1-of-1">
          <p>
            <strong>Channel:</strong>
            <span class="slds-badge slds-m-left_small">{channel}</span>
          </p>
        </div>
      </div>

      <div class="slds-m-bottom_medium">
        <lightning-input
          label="Message Payload"
          placeholder="Enter message here..."
          variant="label-stacked"
        ></lightning-input>
      </div>

      <div class="slds-grid slds-gutters">
        <div class="slds-col">
          <lightning-button-group>
            <lightning-button
              label="Subscribe"
              icon-name="utility:sync"
              onclick={handleSubscribe}
              disabled={isSubscribed}
            ></lightning-button>
            <lightning-button
              label="Unsubscribe"
              icon-name="utility:close"
              onclick={handleUnsubscribe}
              disabled={isNotSubscribed}
            ></lightning-button>
          </lightning-button-group>
        </div>
        <div class="slds-col slds-text-align_right">
          <lightning-button
            variant="success"
            label="Publish Event"
            icon-name="utility:send"
            onclick={handlePublish}
          ></lightning-button>
        </div>
      </div>

      <template lwc:if={hasEvents}>
        <div class="slds-m-top_large">
          <h2 class="slds-text-heading_small slds-m-bottom_small">
            Received Events
          </h2>
          <template for:each={events} for:item="evt" for:index="index">
            <div
              key={evt}
              class="slds-box slds-theme_shade slds-m-bottom_small"
            >
              <pre class="slds-text-body_small">{evt}</pre>
            </div>
          </template>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
